<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download</title>
  <link rel="stylesheet" href="stylesheet.css" type="text/css" charset="utf-8" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    /* General styling */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      color: white;
      font-family: "Special Elite", system-ui;
      overflow: hidden; /* Prevent scrolling */
      z-index: 100;
    }

    /* Container */
    .container {
      width: calc(100% - 100px); /* Account for padding */
      height: calc(100% - 100px); /* Account for padding */
      padding: 200px; /* Space around the content */
      box-sizing: border-box; /* Include padding in dimensions */
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
    }

    /* Title styling */
    .title {
      text-align: left;
      margin-bottom: 20px;
    }

    .title h1 {
      font-size: 2.5rem;
      margin: 0;
      line-height: 1.2;
    }

    /* List styling */
    .list {
      text-align: left;
      font-size: 1.5rem;
      line-height: 2;
    }

/* Animations for images */
    @keyframes fly {
      0% { top: 0%; left: 0%; }
      50% { top: 50%; left: 50%; }
      100% { top: 0%; left: 100%; }
    }

    @keyframes glow {
      0% {
        filter: drop-shadow(0 0 10px green) brightness(1);
      }
      50% {
        filter: drop-shadow(0 0 15px #39FF14) brightness(1.5);
      }
      100% {
        filter: drop-shadow(0 0 10px #39FF14) brightness(1);
      }
    }

    /* Multiple flying instances of ssk1 and ssk2 with glow effect */
    #ssk1, #ssk2, #ssk3, #ssk4, #ssk5, #ssk6 {
      position: absolute;
      width: 200px;
      height: 200px;
      animation: fly 5s linear infinite, glow 5s linear infinite;
    }

    #ssk2, #ssk4, #ssk6 {
      animation-direction: reverse;
    }

    /* Responsive font scaling */
    @media (max-width: 768px) {
      .title h1 {
        font-size: 1.8rem;
      }

      .list {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 600px) {
      .title h1 {
        font-size: 1.5rem;
      }

      .list {
        font-size: 1rem;
      }
    }
    
    /* Ensure the video covers the full background */
    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1; /* Keeps the video behind the content */
    }

    .background-video {
      object-fit: cover; /* Ensure the video covers the whole screen */
      width: 100%;
      height: 100%;
    }

    /* Black overlay with adjustable opacity */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5); /* Adjust opacity (0.5) */
      z-index: 0; /* Places the overlay above the video but below content */
    }

    /* Content */
    .content {
      position: relative;
      z-index: 1; /* Makes the content appear above the overlay */
      color: white;
      text-align: center;
      padding: 20px;
    }
    
 /* Adjust layout for screens smaller than 768px (typical mobile) */
@media (max-width: 768px) {
  .container {
    flex-direction: column; /* Stack elements vertically */
    padding: 20px; /* Reduce padding */
    align-items: center;
    text-align: left;
  }

  .title h1 {
    font-size: 1.8rem; /* Reduce font size */
  }

  .list {
    font-size: 1.2rem; /* Reduce text size */
    line-height: 1.5;
  }

  .background-video {
    object-fit: cover; /* Ensure video still works */
    height: 100%;
  }

 
    
  </style>
</head>
<body>

  <!-- Scalable container -->
  <div class="container">
    <div class="title">
      <h1>You Can Download All of DJ PAYPAL's Music<br><br>Here's How:</h1>
    </div>
    <div class="list">
      1. Download/setup Soulseek<br>
      2. Search for DJ PAYPAL + the title of any release<br>
      3. ??????<br>
      4. Prophet
    </div>
  </div>

  <!-- Animated images -->
  <div id="ssk1">
    <img src="https://amadmoney.github.io/DJPAYPAL/soulseek-png-30385.png" alt="Soulseek Logo" width="200" height="200">
  </div>
  <div id="ssk2">
    <img src="https://amadmoney.github.io/DJPAYPAL/soulseek-png-30385_2.png" alt="Soulseek Logo 2" width="200" height="200">
  </div>


  <!-- Black overlay -->
  

  <!-- Video container with autoplay -->
  <div class="video-container">
    <video autoplay loop muted class="background-video">
      <source src="https://amadmoney.github.io/DJPAYPAL/DOWNLOAD_BG.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

</body>
</html>
