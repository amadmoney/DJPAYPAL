<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Download</title>
  <link rel="stylesheet" href="stylesheet.css" type="text/css" charset="utf-8" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    /* Global styling */
    body, html {
      margin: 10px;
      padding: 20px;
      height: 100%;
      color: white;
      font-family: "Special Elite", system-ui;
      overflow: hidden;
    }

    /* Container */
    .container {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start; /* Left align text */
      padding: 8vw 5vw; /* Adjust padding for all screen sizes */
      width: 100%;
      box-sizing: border-box;
      margin-top: 10%; /* Leave space for the home button at the top */
    }

    /* Title Styling */
    .title {
      text-align: left; /* Left-align title */
      margin-bottom: 20px;
    }

    .title h1 {
      font-size: clamp(1.5rem, 5vw, 3rem); /* Scalable font size */
      line-height: 1.2;
    }

    /* List Styling */
    .list {
      text-align: left; /* Left-align the list */
      font-size: clamp(1rem, 4vw, 1.5rem); /* Scalable font size */
      line-height: 1.6;
    }

    /* Home Button Styling */
    .home-button {
      position: absolute;
      top: 5%; /* Keeps the button fixed in a top position */
      left: 50%;
      transform: translateX(-50%);
      background-color: #39FF14; /* Neon green */
      color: black;
      font-family: "Special Elite", system-ui;
      font-size: 1.5rem;
      padding: 10px 30px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      z-index: 9999;
      animation: glow 5s linear infinite;
      text-transform: uppercase;
      text-align: center;
    }

    /* Glow Effect */
    @keyframes glow {
      0% {
        filter: drop-shadow(0 0 10px green) brightness(1);
      }
      50% {
        filter: drop-shadow(0 0 15px #39FF14) brightness(1.5);
      }
      100% {
        filter: drop-shadow(0 0 10px #39FF14) brightness(1);
      }
    }

    /* Animations for Images */
    @keyframes fly1 {
      0% { top: 0%; left: 0%; }
      50% { top: 50%; left: 50%; }
      100% { top: 0%; left: 100%; }
    }

    @keyframes fly2 {
      0% { top: 0%; left: 100%; }
      50% { top: 50%; left: 50%; }
      100% { top: 0%; left: 0%; }
    }

    /* Images with Glow Effect */
    #ssk1, #ssk2 {
      position: absolute;
      width: 20vw; /* Responsive image width */
      height: auto;
      animation: glow 5s linear infinite;
    }

    #ssk1 {
      animation: fly1 5s linear infinite, glow 5s linear infinite;
    }

    #ssk2 {
      animation: fly2 5s linear infinite, glow 5s linear infinite;
    }

    /* Background Video */
    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .background-video {
      object-fit: cover;
      width: 100%;
      height: 100%;
    }

    /* Overlay */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    /* Responsive Layout Adjustments */
    @media (max-width: 768px) {
      .container {
        padding: 8vw 5vw;
        margin-top: 15%; /* More space for mobile */
      }

      .title h1 {
        font-size: clamp(1.5rem, 5vw, 2.5rem); /* Responsive title size */
      }

      .list {
        font-size: clamp(1rem, 4vw, 1.2rem); /* Responsive list font size */
      }

      #ssk1, #ssk2 {
        width: 15vw; /* Adjust image size on tablets */
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 8vw 5vw;
        margin-top: 20%; /* More space for very small screens */
      }

      .title h1 {
        font-size: clamp(1.2rem, 6vw, 2rem); /* Smaller font size for mobile */
      }

      .list {
        font-size: clamp(1rem, 5vw, 1.2rem); /* Reduce text size on mobile */
      }

      #ssk1, #ssk2 {
        width: 12vw; /* Smaller images for very small screens */
      }
    }
  </style>
</head>
<body>

<!-- Home Button -->
<button class="home-button" onclick="window.location.href='index.html'">Home</button>

<!-- Background Video -->
<div class="video-container">
  <video autoplay muted playsinline loop class="background-video">
    <source src="https://amadmoney.github.io/DJPAYPAL/DOWNLOAD_BG.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<!-- Main Content Container -->
<div class="container">
  <div class="title">
    <h1>You Can Download All of DJ PAYPAL's Music<br><br>Here's How:</h1>
  </div>
  <div class="list">
    1. Download/setup Soulseek<br>
    2. Search for DJ PAYPAL + the title of any release<br>
    3. ??????<br>
    4. Prophet
  </div>
</div>

<!-- Animated Images -->
<div id="ssk1">
  <img src="https://amadmoney.github.io/DJPAYPAL/soulseek-png-30385.png" alt="Soulseek Logo" width="200" height="200">
</div>
<div id="ssk2">
  <img src="https://amadmoney.github.io/DJPAYPAL/soulseek-png-30385_2.png" alt="Soulseek Logo 2" width="200" height="200">
</div>

</body>
</html>
