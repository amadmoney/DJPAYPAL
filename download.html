<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download</title>
  <link rel="stylesheet" href="stylesheet.css" type="text/css" charset="utf-8" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    /* General styling */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: black;
      color: white;
      font-family: "Special Elite", system-ui;
      overflow: hidden; /* Prevent scrolling */
    }

    /* Container */
    .container {
      width: calc(100% - 100px); /* Account for padding */
      height: calc(100% - 100px); /* Account for padding */
      padding: 150px; /* Space around the content */
      box-sizing: border-box; /* Include padding in dimensions */
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
    }

    /* Title styling */
    .title {
      text-align: left;
      margin-bottom: 20px;
    }

    .title h1 {
      font-size: 2.5rem;
      margin: 0;
      line-height: 1.2;
    }

    /* List styling */
    .list {
      text-align: left;
      font-size: 1.5rem;
      line-height: 2;
    }

    /* Animations for images */
    @keyframes fly {
      0% { top: 0%; left: 0%; }
      50% { top: 50%; left: 50%; }
      100% { top: 0%; left: 100%; }
    }

    #ssk1, #ssk2 {
      position: absolute;
      width: 200px;
      height: 200px;
      animation: fly 5s linear infinite;
    }

    #ssk2 {
      animation-direction: reverse;
    }

    /* Responsive font scaling */
    @media (max-width: 768px) {
      .title h1 {
        font-size: 1.8rem;
      }

      .list {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 600px) {
      .title h1 {
        font-size: 1.5rem;
      }

      .list {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Scalable container -->
  <div class="container">
    <div class="title">
      <h1>You Can Download All of<br>DJ PAYPAL's Music<br>Here's How:</h1>
    </div>
    <div class="list">
      1. Download/setup Soulseek<br>
      2. Search for DJ PAYPAL + the title of any release<br>
      3. ??????<br>
      4. Prophet
    </div>
  </div>

  <!-- Animated images -->
  <div id="ssk1">
    <img src="https://amadmoney.github.io/DJPAYPAL/soulseek-png-30385.png" alt="Soulseek Logo width="200" height="200">
  </div>
  <div id="ssk2">
    <img src="https://amadmoney.github.io/DJPAYPAL/soulseek-png-30385_2.png" alt="Soulseek Logo 2 width="200" height="200">
  </div>

</body>
</html>
